<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
      gap: 24px;
      position: relative;
    }

    .badge {
      border: 1.5px solid #c0c8d8;
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #64748b;
      text-transform: uppercase;
    }

    h1 {
      font-size: 72px;
      font-weight: 900;
      line-height: 1.05;
      color: #0f172a;
      text-align: center;
      letter-spacing: -0.03em;
    }

    h1 span {
      color: #2563eb;
    }

    .sub {
      font-size: 20px;
      color: #475569;
      text-align: center;
      max-width: 700px;
      line-height: 1.5;
    }

    .cta {
      background: #2563eb;
      color: white;
      border-radius: 999px;
      padding: 16px 36px;
      font-size: 18px;
      font-weight: 700;
      margin-top: 8px;
    }

    .logo {
      position: absolute;
      bottom: 32px;
      right: 48px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #0f172a;
    }

    .logo span { color: #2563eb; }

    .url {
      position: absolute;
      bottom: 36px;
      left: 48px;
      font-size: 14px;
      color: #94a3b8;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Le 1er système d'acquisition IA pensé pour le marché français</div>
    <h1>L'infrastructure qui remplace<br><span>votre acquisition.</span></h1>
    <p class="sub">Agents IA sur-mesure · Prospection multicanal · Source-to-Scale™<br>Opérationnel en 48h · +50 clients · ROI ×15.6</p>
    <div class="cta">Réserver mon audit gratuit →</div>
    <div class="logo">ADONYME<span>.</span></div>
    <div class="url">adonyme.com</div>
  </div>
</body>
</html>
